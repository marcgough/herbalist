name: Herbalisti Manual Release Gate

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: herbalisti-manual-release-gate
  cancel-in-progress: false

jobs:
  repository-release:
    name: Repository release verification
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Chrome executable
        shell: bash
        run: |
          set -euo pipefail
          if command -v google-chrome >/dev/null 2>&1; then
            echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE=$(command -v google-chrome)" >> "$GITHUB_ENV"
            google-chrome --version
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE=$(command -v google-chrome-stable)" >> "$GITHUB_ENV"
            google-chrome-stable --version
          elif command -v chromium >/dev/null 2>&1; then
            echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE=$(command -v chromium)" >> "$GITHUB_ENV"
            chromium --version
          else
            sudo apt-get update
            sudo apt-get install -y chromium
            echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE=$(command -v chromium)" >> "$GITHUB_ENV"
            chromium --version
          fi

      - name: Repository release verifier
        run: npm run verify:release -- --public-only

      - name: Prepare release evidence artifact
        run: npm run prepare:release-evidence

      - name: Upload release evidence
        uses: actions/upload-artifact@v6
        with:
          name: herbalisti-release-evidence
          path: output/release-evidence
          if-no-files-found: error

      - name: Upload visual smoke screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: herbalisti-visual-smoke
          path: output/playwright/herbalisti-visual-smoke
          if-no-files-found: ignore
