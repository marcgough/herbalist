name: Herbalisti Production Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type deploy-herbalisti-production to publish Herbalisti production.
        required: true
        type: string
      skip_live_verification:
        description: Skip live herbalisti.com verification after deploy. Use only while DNS is still being connected.
        required: true
        default: false
        type: boolean
      skip_live_verification_confirm:
        description: When skip_live_verification is true, type skip-herbalisti-live-verification to acknowledge strict live verification remains required for final completion.
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: herbalisti-production-deploy
  cancel-in-progress: false

jobs:
  confirmation:
    name: Confirm production deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Confirm exact deployment phrase
        shell: bash
        env:
          DEPLOY_CONFIRMATION: ${{ inputs.confirm }}
          SKIP_LIVE_VERIFICATION: ${{ inputs.skip_live_verification }}
          SKIP_LIVE_VERIFICATION_CONFIRMATION: ${{ inputs.skip_live_verification_confirm }}
        run: |
          set -euo pipefail
          if [ "$DEPLOY_CONFIRMATION" != "deploy-herbalisti-production" ]; then
            echo "::error title=Confirmation required::Type deploy-herbalisti-production to run this production deployment workflow."
            exit 1
          fi
          if [ "$SKIP_LIVE_VERIFICATION" = "true" ] && [ "$SKIP_LIVE_VERIFICATION_CONFIRMATION" != "skip-herbalisti-live-verification" ]; then
            echo "::error title=Live verification acknowledgement required::When skip_live_verification is true, type skip-herbalisti-live-verification in skip_live_verification_confirm. Final completion still requires strict live verification."
            exit 1
          fi

  deploy:
    name: Deploy Herbalisti production
    needs: confirmation
    runs-on: ubuntu-latest
    timeout-minutes: 55
    environment:
      name: production
      url: https://herbalisti.com
    env:
      GITHUB_TOKEN: ${{ github.token }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      KIE_API_KEY: ${{ secrets.KIE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required secret presence
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error title=Missing production secret::CLOUDFLARE_API_TOKEN is required for the production deployment workflow."
            missing=1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error title=Missing production account ID::CLOUDFLARE_ACCOUNT_ID is required as a GitHub production environment variable, with a secret fallback supported for existing setups."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if [ -z "${KIE_API_KEY:-}" ]; then
            echo "KIE_API_KEY is not configured; optional Seedance media endpoints will remain disabled."
          fi

      - name: Generate runtime admin tokens
        shell: bash
        run: |
          set -euo pipefail
          while IFS='=' read -r name value; do
            echo "::add-mask::$value"
            printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
          done < <(node --input-type=module <<'NODE'
          import { randomBytes } from 'node:crypto'

          for (const name of ['FEED_ADMIN_TOKEN', 'MEDIA_ADMIN_TOKEN']) {
            console.log(`${name}=herbalisti_${randomBytes(32).toString('base64url')}`)
          }
          NODE
          )

      - name: Verify exact release evidence
        run: npm run verify:github-release-evidence -- --commit "$GITHUB_SHA"

      - name: Verify current production state evidence
        run: npm run verify:production-state-current

      - name: Verify local launch contracts
        run: |
          npm run verify:production-deploy-workflow
          npm run verify:production-deploy-dry-run
          npm run verify:production-d1-resolver
          npm run verify:github-production-dispatch
          npm run verify:production-dispatch-preflight -- --strict
          npm run verify:launch -- --soft
          npm run verify:production-contract
          npm run verify:cloudflare-token-requirements
          npm run verify:d1-manifest
          npm run verify:dns-cutover
          npm run verify:production-secrets
          npm run verify:github-generated-secrets
          npm run verify:production-state
          npm run verify:production-provisioning

      - name: Ensure Cloudflare Pages project
        shell: bash
        run: |
          set -euo pipefail
          projects_json="$(npx wrangler pages project list --json)"
          if PROJECTS_JSON="$projects_json" node -e "const payload = JSON.parse(process.env.PROJECTS_JSON || '[]'); const projects = Array.isArray(payload) ? payload : (payload.result || []); process.exit(projects.some((project) => project.name === 'herbalisti') ? 0 : 1)"; then
            echo "Cloudflare Pages project herbalisti already exists."
          else
            npx wrangler pages project create herbalisti --production-branch main
          fi

      - name: Resolve production D1 database
        shell: bash
        run: npm run resolve:production-d1 -- --create-if-missing --github-env "$GITHUB_ENV"

      - name: Activate production D1 bindings in runner
        shell: bash
        run: npm run configure:cloudflare -- --d1 "$CLOUDFLARE_D1_DATABASE_ID" --apply

      - name: Verify configured launch contracts
        run: |
          npm run verify:launch -- --soft
          npm run verify:d1-manifest
          npm run verify:production-state
          npm run verify:production-provisioning

      - name: Apply production D1 migrations
        run: |
          npm run verify:d1-manifest
          npx wrangler d1 migrations apply herbalisti --remote

      - name: Set Cloudflare Pages runtime secrets
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$FEED_ADMIN_TOKEN" | npx wrangler pages secret put FEED_ADMIN_TOKEN --project-name herbalisti
          if [ -n "${KIE_API_KEY:-}" ]; then
            printf '%s' "$KIE_API_KEY" | npx wrangler pages secret put KIE_API_KEY --project-name herbalisti
            printf '%s' "$MEDIA_ADMIN_TOKEN" | npx wrangler pages secret put MEDIA_ADMIN_TOKEN --project-name herbalisti
          else
            echo "Skipping optional Seedance media secrets because KIE_API_KEY is not configured."
          fi

      - name: Deploy Cloudflare Pages
        run: npm run deploy:cloudflare

      - name: Deploy scheduled news Worker
        run: npm run deploy:news-worker

      - name: Set scheduled Worker runtime secret
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$FEED_ADMIN_TOKEN" | npx wrangler secret put FEED_ADMIN_TOKEN --config wrangler.news.toml

      - name: Seed live Signals feed
        if: ${{ !inputs.skip_live_verification }}
        shell: bash
        run: npm run seed:production-feed -- --base-url https://herbalisti.com --confirm seed-herbalisti-feed --evidence-path output/production-deploy/feed-seed-evidence.json

      - name: Verify live production
        if: ${{ !inputs.skip_live_verification }}
        run: |
          npm run verify:live-readiness -- --strict
          npm run verify:production -- https://herbalisti.com
          npm run verify:goal-readiness -- --strict

      - name: Write production deployment evidence
        if: ${{ always() }}
        shell: bash
        env:
          HERBALISTI_PRODUCTION_URL: https://herbalisti.com
          LIVE_VERIFICATION_SKIPPED: ${{ inputs.skip_live_verification }}
          LIVE_VERIFICATION_SKIP_ACKNOWLEDGED: ${{ inputs.skip_live_verification && inputs.skip_live_verification_confirm == 'skip-herbalisti-live-verification' }}
          PRODUCTION_DEPLOY_JOB_STATUS: ${{ job.status }}
        run: npm run prepare:production-deploy-evidence

      - name: Verify production deployment evidence
        if: ${{ always() }}
        shell: bash
        env:
          HERBALISTI_PRODUCTION_URL: https://herbalisti.com
          LIVE_VERIFICATION_SKIPPED: ${{ inputs.skip_live_verification }}
          LIVE_VERIFICATION_SKIP_ACKNOWLEDGED: ${{ inputs.skip_live_verification && inputs.skip_live_verification_confirm == 'skip-herbalisti-live-verification' }}
          PRODUCTION_DEPLOY_JOB_STATUS: ${{ job.status }}
        run: npm run verify:production-deploy-evidence

      - name: Upload production deployment evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: herbalisti-production-deploy-evidence
          path: output/production-deploy
          if-no-files-found: error
          retention-days: 90
